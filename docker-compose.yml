services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aistatus
      POSTGRES_PASSWORD: aistatus
      POSTGRES_DB: aistatus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aistatus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://aistatus:aistatus@postgres:5432/aistatus
      REDIS_URL: redis://redis:6379
      API_PORT: "3001"
      API_SECRET: ${API_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://aistatus:aistatus@postgres:5432/aistatus
      REDIS_URL: redis://redis:6379
      CONFIG_PATH: /app/config/providers.yml
    volumes:
      - ./config:/app/config:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
